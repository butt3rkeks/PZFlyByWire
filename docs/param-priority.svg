<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Consolas, 'Courier New', monospace" font-size="11">
  <defs>
    <style>
      .box { rx: 5; ry: 5; stroke-width: 1.5; }
      .title { font-weight: bold; font-size: 15px; fill: #222; }
      .subtitle { font-size: 11px; fill: #888; }
      .label { font-weight: bold; font-size: 13px; }
      .detail { font-size: 10px; fill: #555; }
      .example { font-size: 10px; fill: #333; font-style: italic; }
      .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .fall-arrow { stroke: #cc7b7b; stroke-width: 1.5; fill: none; marker-end: url(#ah-r); stroke-dasharray: 5,3; }
      .pri { font-size: 20px; font-weight: bold; }
      .tag { font-size: 9px; font-weight: bold; fill: #fff; }
    </style>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#888"/>
    </marker>
    <marker id="ah-r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#cc7b7b"/>
    </marker>
  </defs>

  <text x="360" y="25" text-anchor="middle" class="title">Parameter Resolution Priority</text>
  <text x="360" y="42" text-anchor="middle" class="subtitle">HeliConfig.get(shorthand) — checked in order, first non-nil wins</text>

  <!-- Priority 1: Runtime Override -->
  <text x="42" y="90" text-anchor="middle" class="pri" fill="#cc7b7b">1</text>
  <rect x="60" y="70" width="600" height="65" class="box" fill="#fce8e8" stroke="#cc7b7b"/>
  <text x="80" y="92" class="label" fill="#8c2a2a">Runtime Override</text>
  <rect x="280" y="78" width="90" height="16" rx="8" ry="8" fill="#cc7b7b"/>
  <text x="325" y="90" text-anchor="middle" class="tag">SESSION ONLY</text>
  <text x="80" y="108" class="detail">Set via /hef &lt;name&gt; &lt;value&gt; in chat. Stored in _overrides table (memory only).</text>
  <text x="80" y="122" class="example">e.g.  /hef positionProportionalGain 5  ->  _overrides["positionProportionalGain"] = 5</text>
  <text x="80" y="122" class="detail"></text>

  <!-- Fallthrough arrow -->
  <text x="340" y="150" text-anchor="middle" class="detail" fill="#cc7b7b">nil? fall through</text>
  <line x1="360" y1="135" x2="360" y2="165" class="fall-arrow"/>

  <!-- Priority 2: SandboxVars -->
  <text x="42" y="190" text-anchor="middle" class="pri" fill="#d4a44a">2</text>
  <rect x="60" y="170" width="600" height="65" class="box" fill="#fef3e0" stroke="#d4a44a"/>
  <text x="80" y="192" class="label" fill="#8a6a10">SandboxVars</text>
  <rect x="220" y="178" width="100" height="16" rx="8" ry="8" fill="#d4a44a"/>
  <text x="270" y="190" text-anchor="middle" class="tag">PERSISTED / SAVE</text>
  <text x="80" y="208" class="detail">Read from SandboxVars[ns][field]. Set in sandbox UI or SandboxVars.lua. Persisted in save file.</text>
  <text x="80" y="222" class="example">e.g.  SandboxVars.FBW.GravityEstimate = 9.8  (ns="FBW", field="GravityEstimate")</text>

  <!-- Fallthrough arrow -->
  <text x="340" y="250" text-anchor="middle" class="detail" fill="#cc7b7b">nil? fall through</text>
  <line x1="360" y1="235" x2="360" y2="265" class="fall-arrow"/>

  <!-- Priority 3: Hardcoded Default -->
  <text x="42" y="290" text-anchor="middle" class="pri" fill="#6ab06a">3</text>
  <rect x="60" y="270" width="600" height="55" class="box" fill="#e0f0e0" stroke="#6ab06a"/>
  <text x="80" y="292" class="label" fill="#2d7d46">Hardcoded Default</text>
  <rect x="260" y="278" width="80" height="16" rx="8" ry="8" fill="#6ab06a"/>
  <text x="300" y="290" text-anchor="middle" class="tag">ALWAYS SET</text>
  <text x="80" y="308" class="detail">Defined in PARAMS table at registration time. Always returns a value (never nil).</text>
  <text x="80" y="322" class="example">e.g.  { default = 9.8, min = 5.0, max = 20.0, desc = "Gravity (Bullet units/s^2)" }</text>

  <!-- Registration sources -->
  <rect x="60" y="340" width="600" height="30" rx="4" ry="4" fill="#fafafa" stroke="#ddd"/>
  <text x="80" y="359" class="detail">Params registered by: HeliConfig.lua (HEF.* framework)  |  FBWHeliConfig.lua (FBW.* engine)  |  Your engine's config</text>
</svg>
