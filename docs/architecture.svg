<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 680" font-family="Consolas, 'Courier New', monospace" font-size="12">
  <defs>
    <style>
      .layer { rx: 6; ry: 6; stroke-width: 1.5; }
      .label { font-weight: bold; font-size: 13px; }
      .sublabel { font-size: 11px; fill: #555; }
      .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .data-arrow { stroke: #2d7d46; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); stroke-dasharray: 6,3; }
      .phase-label { font-size: 10px; fill: #777; font-style: italic; }
      .legend-text { font-size: 11px; fill: #555; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2d7d46"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">HEF Architecture</text>
  <text x="360" y="46" text-anchor="middle" font-size="11" fill="#888">Layered dependency graph — each layer only calls downward</text>

  <!-- Layer 1: Core/Adapters -->
  <rect x="40" y="65" width="300" height="50" class="layer" fill="#e8f4f8" stroke="#7bb8cc"/>
  <text x="190" y="85" text-anchor="middle" class="label" fill="#2a7a8c">Core/Adapters</text>
  <text x="190" y="100" text-anchor="middle" class="sublabel">HeliForceAdapter  HeliVelocityAdapter</text>

  <!-- Layer 1b: Core/Models -->
  <rect x="380" y="65" width="300" height="50" class="layer" fill="#e8f4f8" stroke="#7bb8cc"/>
  <text x="530" y="85" text-anchor="middle" class="label" fill="#2a7a8c">Core/Models</text>
  <text x="530" y="100" text-anchor="middle" class="sublabel">Quaternion  RotationMatrix</text>

  <!-- Arrow down from Adapters -->
  <line x1="190" y1="115" x2="190" y2="135" class="arrow"/>
  <!-- Arrow down from Models -->
  <line x1="530" y1="115" x2="530" y2="135" class="arrow"/>

  <!-- Layer 2: Core/Toolkit -->
  <rect x="40" y="140" width="640" height="50" class="layer" fill="#eef6e8" stroke="#8cbd7b"/>
  <text x="360" y="160" text-anchor="middle" class="label" fill="#4a7a3a">Core/Toolkit</text>
  <text x="360" y="175" text-anchor="middle" class="sublabel">PDController  SimModel2D  ErrorTracker2D  VerticalModel  GroundModel  CoordUtil  VelocityUtil</text>

  <!-- Arrow down -->
  <line x1="360" y1="190" x2="360" y2="210" class="arrow"/>

  <!-- Layer 3: Core/Util -->
  <rect x="40" y="215" width="640" height="50" class="layer" fill="#f5f0e0" stroke="#c4a94d"/>
  <text x="360" y="235" text-anchor="middle" class="label" fill="#8a7520">Core/Util</text>
  <text x="360" y="250" text-anchor="middle" class="sublabel">HeliConfig  HeliUtil  HeliCompat  HeliTerrainUtil</text>

  <!-- Arrow down -->
  <line x1="360" y1="265" x2="360" y2="285" class="arrow"/>

  <!-- Layer 4: HEF Types -->
  <rect x="40" y="290" width="640" height="55" class="layer" fill="#f0e8f5" stroke="#a07bc4"/>
  <text x="360" y="310" text-anchor="middle" class="label" fill="#6a3a8c">HEF Data Contracts</text>
  <text x="360" y="325" text-anchor="middle" class="sublabel">HEFContext  HEFCorrectionCtx  HEFUpdateResult  HEFGroundResult</text>
  <text x="360" y="338" text-anchor="middle" class="sublabel">HEFTunable  HEFSandboxOptions  HEFCommand  HEFEngineInfo</text>

  <!-- Arrow down -->
  <line x1="360" y1="345" x2="360" y2="365" class="arrow"/>

  <!-- Layer 5: IFlightEngine -->
  <rect x="200" y="370" width="320" height="45" class="layer" fill="#fce8e8" stroke="#cc7b7b"/>
  <text x="360" y="390" text-anchor="middle" class="label" fill="#8c2a2a">IFlightEngine</text>
  <text x="360" y="405" text-anchor="middle" class="sublabel">Interface + Registry  (REQUIRED + OPTIONAL methods)</text>

  <!-- Arrow down -->
  <line x1="360" y1="415" x2="360" y2="435" class="arrow"/>

  <!-- Layer 6: Engines/FBW -->
  <rect x="100" y="440" width="520" height="55" class="layer" fill="#fef3e0" stroke="#d4a44a"/>
  <text x="360" y="460" text-anchor="middle" class="label" fill="#8a6a10">Engines/FBW</text>
  <text x="360" y="475" text-anchor="middle" class="sublabel">FBWEngine  FBWOrientation  FBWFilters  FBWForceComputer</text>
  <text x="360" y="488" text-anchor="middle" class="sublabel">FBWYawController  FBWInputProcessor  FBWFlightModel  FBWHeliConfig</text>

  <!-- Arrow down -->
  <line x1="360" y1="495" x2="360" y2="515" class="arrow"/>

  <!-- Layer 7: HeliSimService -->
  <rect x="220" y="520" width="280" height="40" class="layer" fill="#e8e8f0" stroke="#8888bb"/>
  <text x="360" y="544" text-anchor="middle" class="label" fill="#44448a">HeliSimService</text>

  <!-- Arrow down -->
  <line x1="360" y1="560" x2="360" y2="580" class="arrow"/>

  <!-- Layer 8: HeliMove + Debug + Auxiliary -->
  <rect x="40" y="585" width="250" height="55" class="layer" fill="#f0f0f0" stroke="#999"/>
  <text x="165" y="605" text-anchor="middle" class="label" fill="#333">HeliMove</text>
  <text x="165" y="620" text-anchor="middle" class="sublabel">Orchestrator + Events</text>
  <text x="165" y="633" text-anchor="middle" class="phase-label">OnTick  OnTickEvenPaused  OnExitVehicle</text>

  <rect x="310" y="585" width="170" height="55" class="layer" fill="#f0f0f0" stroke="#999"/>
  <text x="395" y="605" text-anchor="middle" class="label" fill="#333">HeliAuxiliary</text>
  <text x="395" y="620" text-anchor="middle" class="sublabel">Ghost  Lights  Gas</text>
  <text x="395" y="633" text-anchor="middle" class="sublabel">WallDamage</text>

  <rect x="500" y="585" width="180" height="55" class="layer" fill="#f0f0f0" stroke="#999"/>
  <text x="590" y="605" text-anchor="middle" class="label" fill="#333">Debug</text>
  <text x="590" y="620" text-anchor="middle" class="sublabel">HeliDebug</text>
  <text x="590" y="633" text-anchor="middle" class="sublabel">HeliDebugCommands</text>

  <!-- Data flow arrows -->
  <!-- HEFCtx down -->
  <path d="M 80,345 C 80,358 55,420 55,455 L 55,455" class="data-arrow"/>
  <text x="32" y="400" class="phase-label" transform="rotate(-90,32,400)">HEFCtx down</text>

  <!-- HEFUpdateResult up -->
  <path d="M 665,455 C 665,420 685,358 685,345" class="data-arrow"/>
  <text x="705" y="400" class="phase-label" transform="rotate(90,705,400)">Results up</text>

  <!-- Legend -->
  <rect x="40" y="655" width="640" height="22" rx="4" ry="4" fill="#fafafa" stroke="#ddd"/>
  <line x1="55" y1="666" x2="85" y2="666" class="arrow"/>
  <text x="90" y="670" class="legend-text">calls</text>
  <line x1="180" y1="666" x2="210" y2="666" class="data-arrow"/>
  <text x="215" y="670" class="legend-text">data flow (typed contracts)</text>
  <text x="430" y="670" class="legend-text">shared/ loads top-down  |  client/ loads bottom-up at runtime</text>
</svg>
